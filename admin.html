<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | دمنهور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 p-6 font-['Cairo']">

    <div class="max-w-4xl mx-auto">
        <div class="bg-blue-900 text-white p-8 rounded-[2rem] shadow-lg mb-8 text-center">
            <p class="text-blue-200 font-bold mb-2">إحصائيات الحضور المباشرة</p>
            <h1 id="count" class="text-6xl font-black">0</h1>
            <p class="mt-2 text-sm opacity-70">طالب سجلوا الآن</p>
        </div>

        <div class="bg-white rounded-3xl shadow-sm overflow-hidden border">
            <table class="w-full text-right">
                <thead class="bg-slate-100 border-b">
                    <tr>
                        <th class="p-4">كود الطالب</th>
                        <th class="p-4">توقيت الحضور</th>
                        <th class="p-4 text-center">التاريخ</th>
                    </tr>
                </thead>
                <tbody id="rows">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmKtwqJeZukgwyWCK1CiQVptUd3pN2dGk",
            authDomain: "dnu-343ee.firebaseapp.com",
            projectId: "dnu-343ee",
            storageBucket: "dnu-343ee.firebasestorage.app",
            messagingSenderId: "1001058110283",
            appId: "1:1001058110283:web:b2d16bbd496d6b7435f6ce",
            measurementId: "G-MZJVHWTYG7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // تحديث حي (Real-time)
        db.collection("attendance").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
            const tbody = document.getElementById('rows');
            document.getElementById('count').innerText = querySnapshot.size;
            tbody.innerHTML = "";
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-blue-50">
                        <td class="p-4 font-bold text-blue-900">${data.student_id}</td>
                        <td class="p-4 text-gray-600">${data.time || 'جاري التحميل...'}</td>
                        <td class="p-4 text-center text-gray-400 text-xs">${data.date || ''}</td>
                    </tr>
                `;
            });
        }, (error) => {
            console.error("خطأ في جلب البيانات: ", error);
        });
    </script>
</body>
</html>
