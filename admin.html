<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة السحابية | جامعة دمنهور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 p-6 font-['Cairo']">

    <div id="login" class="fixed inset-0 bg-[#0f172a] flex items-center justify-center z-50 p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6 italic">إدارة دمنهور الأهلية</h2>
            <input type="password" id="adminPass" placeholder="كلمة المرور" class="w-full p-4 border-2 rounded-2xl mb-4 text-center outline-none">
            <button onclick="doLogin()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold">دخول السحابة</button>
        </div>
    </div>

    <div id="main" class="hidden max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">الحضور السحابي (Live)</h1>
            <button onclick="exportExcel()" class="bg-green-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">تصدير Excel 📥</button>
        </header>

        <div class="bg-white p-8 rounded-[2rem] shadow-sm mb-8 text-center border-b-8 border-blue-900">
            <p class="text-slate-400 font-bold mb-1 uppercase text-xs">إجمالي الحاضرين الآن</p>
            <h2 id="liveCount" class="text-6xl font-black text-blue-900 italic">0</h2>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border">
            <table class="w-full text-right">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-5">كود الطالب</th>
                        <th class="p-5">الوقت</th>
                        <th class="p-5 text-center">التاريخ</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmKtwqJeZukgwyWCK1CiQVptUd3pN2dGk",
            authDomain: "dnu-343ee.firebaseapp.com",
            projectId: "dnu-343ee",
            storageBucket: "dnu-343ee.firebasestorage.app",
            messagingSenderId: "1001058110283",
            appId: "1:1001058110283:web:b2d16bbd496d6b7435f6ce",
            measurementId: "G-MZJVHWTYG7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentAttendance = [];

        function doLogin() {
            if(document.getElementById('adminPass').value === "132006") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('main').classList.remove('hidden');
                startLiveUpdate();
            } else { alert("خطأ!"); }
        }

        // تحديث البيانات لحظياً من السحابة
        function startLiveUpdate() {
            db.collection("attendance").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                currentAttendance = [];
                const tbody = document.getElementById('rows');
                tbody.innerHTML = "";
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    currentAttendance.push(data);
                    tbody.innerHTML += `
                        <tr class="border-b">
                            <td class="p-5 font-bold">${data.student_id}</td>
                            <td class="p-5">${data.time_string}</td>
                            <td class="p-5 text-center text-slate-400">${data.date_string}</td>
                        </tr>
                    `;
                });
                document.getElementById('liveCount').innerText = snapshot.size;
            });
        }

        function exportExcel() {
            if(currentAttendance.length === 0) return alert("لا توجد بيانات");
            const ws = XLSX.utils.json_to_sheet(currentAttendance);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "حضور_دمنهور_سحابي.xlsx");
        }
    </script>
</body>
</html>
