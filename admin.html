<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة | كشف الحضور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        @media print { .no-print { display: none; } .print-only { display: block; } table { width: 100%; border-collapse: collapse; } th, td { border: 1px solid black; padding: 8px; text-align: center; } }
    </style>
</head>
<body class="bg-slate-100 p-6">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6 no-print">
            <h1 class="text-2xl font-black text-slate-800">كشف حضور الطلاب المباشر</h1>
            <div class="flex gap-2">
                <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">🖨️ طباعة الكشف</button>
                <button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold">📊 تصدير Excel</button>
                <button onclick="resetSystem()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm">تصفير الكشف</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden border">
            <table class="w-full text-center">
                <thead class="bg-[#6d28d9] text-white"> <tr>
                        <th class="p-4 border-l border-white/20 text-sm">Timestamp</th>
                        <th class="p-4 border-l border-white/20">الاسم</th>
                        <th class="p-4 border-l border-white/20">الرقم القومى</th>
                        <th class="p-4 border-l border-white/20">الموبايل</th>
                        <th class="p-4">البرنامج</th>
                    </tr>
                </thead>
                <tbody id="adminTable" class="text-slate-700 font-bold"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* نفس الإعدادات السابقة */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentData = [];

        db.collection("attendance").orderBy("created_at", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('adminTable');
            tbody.innerHTML = "";
            currentData = [];
            snap.forEach(doc => {
                const d = doc.data();
                currentData.push(d);
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition">
                        <td class="p-4 text-xs font-mono text-slate-500">${d.timestamp}</td>
                        <td class="p-4">${d.full_name}</td>
                        <td class="p-4 font-mono">${d.national_id}</td>
                        <td class="p-4 font-mono">${d.mobile}</td>
                        <td class="p-4 text-blue-700">${d.program}</td>
                    </tr>
                `;
            });
        });

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(currentData.map(d => ({
                "Timestamp": d.timestamp,
                "الاسم": d.full_name,
                "الرقم القومى": d.national_id,
                "الموبايل": d.mobile,
                "البرنامج": d.program
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "Attendance_Report.xlsx");
        }

        function resetSystem() {
            if(confirm("هل أنت متأكد من مسح جميع السجلات؟")) {
                db.collection("attendance").get().then(s => s.forEach(doc => doc.ref.delete()));
            }
        }
    </script>
</body>
</html>
