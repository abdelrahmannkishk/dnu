<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الحضور | جامعة دمنهور الأهلية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .main-card { background: white; border-radius: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border-top: 10px solid #1e3a8a; }
        .input-field { border: 2px solid #f1f5f9; padding: 1rem; border-radius: 1rem; width: 100%; outline: none; transition: 0.3s; text-align: right; font-weight: 600; background: #f8fafc; }
        .input-field:focus { border-color: #1e3a8a; background: white; box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }
        .btn-submit { background: #1e3a8a; color: white; width: 100%; padding: 1.2rem; border-radius: 1.2rem; font-weight: 700; font-size: 1.1rem; transition: 0.3s; margin-top: 1rem; }
        .btn-submit:hover { background: #172554; transform: translateY(-2px); }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="main-card w-full max-w-md p-10 text-center">
        <img src="https://i.postimg.cc/Y2D4WB9D/Untitled-1102202.png" alt="University Logo" class="h-28 mx-auto mb-6">
        
        <h1 class="text-2xl font-black text-slate-800 mb-1">جامعة دمنهور الأهلية</h1>
        <p class="text-slate-400 font-bold text-xs mb-8 uppercase tracking-[0.2em]">الحضور والغياب</p>

        <div id="attendanceForm" class="space-y-5">
            <div class="text-right">
                <label class="text-xs font-black text-slate-400 mr-2 mb-2 block uppercase">اسم الطالب رباعي</label>
                <input type="text" id="name" placeholder="أدخل اسمك الكامل" class="input-field">
            </div>

            <div class="text-right">
                <label class="text-xs font-black text-slate-400 mr-2 mb-2 block uppercase">الرقم الجامعي</label>
                <input type="number" id="sid" placeholder="أدخل الكود الخاص بك" class="input-field text-center font-bold">
            </div>

            <div class="text-right">
                <label class="text-xs font-black text-slate-400 mr-2 mb-2 block uppercase">البرنامج (التخصص)</label>
                <select id="prog" class="input-field">
                    <option value="">اختر التخصص</option>
                    <option value="AI - G1">AI - G1</option>
                    <option value="AI - G2">AI - G2</option>
                    <option value="CS - G1">CS - G1</option>
                    <option value="CS - G2">CS - G2</option>
                </select>
            </div>
            
            <button onclick="submitAttendance()" id="btn" class="btn-submit">تسجيل الحضور</button>
        </div>

        <div id="status" class="mt-8 hidden p-5 rounded-2xl font-bold text-sm"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmKtwqJeZukgwyWCK1CiQVptUd3pN2dGk",
            authDomain: "dnu-343ee.firebaseapp.com",
            projectId: "dnu-343ee",
            storageBucket: "dnu-343ee.firebasestorage.app",
            messagingSenderId: "1001058110283",
            appId: "1:1001058110283:web:b2d16bbd496d6b7435f6ce"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function submitAttendance() {
            const name = document.getElementById('name').value.trim();
            const sid = document.getElementById('sid').value.trim();
            const prog = document.getElementById('prog').value;
            const btn = document.getElementById('btn');

            if(!name || !sid || !prog) return alert("يرجى ملء جميع البيانات");

            if(localStorage.getItem('attended_' + sid)) {
                return msg("⚠️ سجلت حضورك بالفعل من هذا الهاتف", "bg-amber-100 text-amber-700");
            }

            btn.disabled = true; btn.innerText = "جاري الحفظ...";

            try {
                // منع التكرار في السحابة
                const check = await db.collection("attendance").where("student_id", "==", sid).get();
                if(!check.empty) {
                    btn.disabled = false; btn.innerText = "تسجيل الحضور";
                    return msg("❌ هذا الكود مسجل مسبقاً اليوم", "bg-red-100 text-red-700");
                }

                await db.collection("attendance").add({
                    timestamp: new Date().toLocaleString('ar-EG'),
                    full_name: name,
                    student_id: sid,
                    program: prog,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                localStorage.setItem('attended_' + sid, 'true');
                msg("✅ تم تسجيل حضورك بنجاح", "bg-green-100 text-green-700");
                document.getElementById('attendanceForm').classList.add('hidden');
            } catch(e) { alert("خطأ في الاتصال"); btn.disabled = false; }
        }

        function msg(t, c) {
            const s = document.getElementById('status');
            s.innerText = t; s.className = "mt-8 p-5 rounded-2xl font-bold " + c;
            s.classList.remove('hidden');
        }
    </script>
</body>
</html>
