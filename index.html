<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة دمنهور الأهلية | تسجيل الحضور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .main-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.04); position: relative; overflow: hidden; }
        .main-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #1e3a8a, #d4af37); }
        .input-field { border: 1.5px solid #e2e8f0; transition: 0.3s; }
        .input-field:focus { border-color: #1e3a8a; box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }
        .btn-submit { background: #1e3a8a; transition: 0.3s; box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2); }
        .btn-submit:hover { background: #172554; transform: translateY(-2px); }
        .logo-img { max-height: 120px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="main-card w-full max-w-md p-8 text-center bg-white">
        <div class="mb-6">
            <img src="https://i.postimg.cc/Y2D4WB9D/Untitled-1102202.png" alt="University Logo" class="logo-img mx-auto mb-4">
            <h1 class="text-xl font-black text-slate-800 tracking-tight">جامعة دمنهور الأهلية</h1>
            <p class="text-slate-500 font-semibold text-xs tracking-widest mt-1 uppercase">كلية الحاسبات والذكاء الإصطناعي</p>
        </div>

        <div id="formSection" class="space-y-5">
            <div class="text-right">
                <label class="text-xs font-bold text-slate-400 mr-1 mb-2 block tracking-wide">اسم الطالب رباعي</label>
                <input type="text" id="studentName" placeholder="أدخل اسمك بالكامل" 
                    class="input-field w-full p-4 rounded-xl outline-none text-right font-semibold text-slate-700">
            </div>

            <div class="text-right">
                <label class="text-xs font-bold text-slate-400 mr-1 mb-2 block tracking-wide">الكود الجامعي</label>
                <input type="text" id="studentId" placeholder="أدخل رقمك الجامعي" 
                    class="input-field w-full p-4 rounded-xl outline-none text-center font-bold text-lg text-slate-800 tracking-widest">
            </div>
            
            <button onclick="submitAttendance()" id="mainBtn" class="btn-submit w-full text-white py-4 rounded-xl font-bold text-lg mt-2">
                إثبات حضور الطالب
            </button>
        </div>

        <div id="statusBox" class="mt-8 hidden p-4 rounded-xl font-bold text-sm animate-pulse"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmKtwqJeZukgwyWCK1CiQVptUd3pN2dGk",
            authDomain: "dnu-343ee.firebaseapp.com",
            projectId: "dnu-343ee",
            storageBucket: "dnu-343ee.firebasestorage.app",
            messagingSenderId: "1001058110283",
            appId: "1:1001058110283:web:b2d16bbd496d6b7435f6ce",
            measurementId: "G-MZJVHWTYG7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const COLLEGE_LOC = { lat: 31.0416, lng: 30.4655 }; 
        const RADIUS = 250; 

        async function submitAttendance() {
            const name = document.getElementById('studentName').value.trim();
            const id = document.getElementById('studentId').value.trim();
            const btn = document.getElementById('mainBtn');

            if(!name || !id) return alert("يرجى ملء كافة البيانات");

            if(localStorage.getItem('attended_' + id)) {
                return showStatus("⚠️ تم تسجيل الحضور مسبقاً لهذا الرقم الجامعي", "bg-amber-50 text-amber-700");
            }

            btn.disabled = true;
            btn.innerText = "جاري المعالجة...";

            try {
                const settings = await db.collection("settings").doc("gps_config").get();
                const isGpsRequired = settings.exists ? settings.data().is_required : true;

                if (!isGpsRequired) {
                    saveRecord(name, id);
                } else {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const dist = calcDistance(pos.coords.latitude, pos.coords.longitude, COLLEGE_LOC.lat, COLLEGE_LOC.lng);
                        if(dist <= RADIUS) {
                            saveRecord(name, id);
                        } else {
                            alert(`يجب أن تكون داخل الجامعة للتسجيل. أنت الآن بعيد بمسافة ${Math.round(dist)} متر`);
                            btn.disabled = false; btn.innerText = "إثبات حضور الطالب";
                        }
                    }, () => {
                        alert("يرجى تفعيل صلاحية الوصول للموقع (GPS)");
                        btn.disabled = false; btn.innerText = "إثبات حضور الطالب";
                    }, { enableHighAccuracy: true });
                }
            } catch (e) {
                alert("حدث خطأ في الاتصال");
                btn.disabled = false;
            }
        }

        async function saveRecord(name, id) {
            await db.collection("attendance").add({
                name: name,
                student_id: id,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                time: new Date().toLocaleTimeString('ar-EG'),
                date: new Date().toLocaleDateString('ar-EG')
            });
            localStorage.setItem('attended_' + id, 'true');
            showStatus("✅ تم إثبات الحضور بنجاح", "bg-green-50 text-green-700 border border-green-100");
            document.getElementById('formSection').style.display = 'none';
        }

        function showStatus(msg, classes) {
            const box = document.getElementById('statusBox');
            box.innerText = msg;
            box.className = `mt-8 p-4 rounded-xl font-bold text-sm ${classes}`;
            box.classList.remove('hidden');
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
