<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حضور الطلاب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .main-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 8px solid #1e3a8a; }
        .input-field { border: 2px solid #f1f5f9; padding: 1rem; border-radius: 1rem; width: 100%; outline: none; transition: 0.3s; text-align: right; font-weight: 600; }
        .input-field:focus { border-color: #1e3a8a; background: white; box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="main-card w-full max-w-md p-10 text-center">
        <img src="https://i.postimg.cc/Y2D4WB9D/Untitled-1102202.png" alt="Logo" class="h-24 mx-auto mb-6">
        <h1 class="text-xl font-black text-slate-800 mb-6">جامعة دمنهور الأهلية</h1>

        <div id="formSection" class="space-y-5">
            <input type="text" id="stuName" placeholder="الاسم رباعي" class="input-field">
            <input type="number" id="stuId" placeholder="الرقم الجامعي" class="input-field text-center font-bold">
            <select id="stuProg" class="input-field">
                <option value="">اختر التخصص</option>
                <option value="AI-G1">AI-G1</option>
                <option value="AI-G2">AI-G2</option>
                <option value="CS-G1">CS-G1</option>
                <option value="CS-G2">CS-G2</option>
            </select>
            <button onclick="handleSubmission()" id="submitBtn" class="w-full bg-[#1e3a8a] text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-blue-900 transition">تسجيل الحضور الآن</button>
        </div>
        <div id="statusMsg" class="mt-8 hidden p-5 rounded-2xl font-bold text-sm"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmKtwqJeZukgwyWCK1CiQVptUd3pN2dGk",
            authDomain: "dnu-343ee.firebaseapp.com",
            projectId: "dnu-343ee",
            storageBucket: "dnu-343ee.firebasestorage.app",
            messagingSenderId: "1001058110283",
            appId: "1:1001058110283:web:b2d16bbd496d6b7435f6ce"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const COLLEGE_LOC = { lat: 31.0416, lng: 30.4655 }; 
        const RADIUS = 250; 

        async function handleSubmission() {
            const name = document.getElementById('stuName').value.trim();
            const id = document.getElementById('stuId').value.trim();
            const prog = document.getElementById('stuProg').value;
            const btn = document.getElementById('submitBtn');

            if(!name || !id || !prog) return alert("يرجى إكمال البيانات");

            // منع التسجيل أكثر من مرة من نفس الجهاز نهائياً
            if(localStorage.getItem('device_locked')) {
                return showStatus("⚠️ عذراً، تم تسجيل حضور مسبق من هذا الجهاز. لا يمكن التسجيل لمرة أخرى.", "bg-amber-100 text-amber-700");
            }

            btn.disabled = true; btn.innerText = "جاري التحقق...";

            try {
                // منع تكرار الرقم الجامعي في السحابة
                const check = await db.collection("attendance").where("student_id", "==", id).get();
                if(!check.empty) {
                    btn.disabled = false; btn.innerText = "تسجيل الحضور الآن";
                    return showStatus("❌ هذا الرقم الجامعي مسجل مسبقاً!", "bg-red-100 text-red-700");
                }

                // فحص حالة زر الموقع من الأدمن
                const settings = await db.collection("settings").doc("gps_config").get();
                const isGpsRequired = settings.exists ? settings.data().is_required : true;

                if (!isGpsRequired) {
                    saveFinalData(name, id, prog);
                } else {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const dist = calcDist(pos.coords.latitude, pos.coords.longitude, COLLEGE_LOC.lat, COLLEGE_LOC.lng);
                        if(dist <= RADIUS) {
                            saveFinalData(name, id, prog);
                        } else {
                            alert("يجب أن تكون داخل الجامعة للتسجيل");
                            btn.disabled = false; btn.innerText = "تسجيل الحضور الآن";
                        }
                    }, () => {
                        alert("يرجى تفعيل الـ GPS");
                        btn.disabled = false; btn.innerText = "تسجيل الحضور الآن";
                    }, { enableHighAccuracy: true });
                }
            } catch(e) { btn.disabled = false; }
        }

        async function saveFinalData(name, id, prog) {
            await db.collection("attendance").add({
                timestamp: new Date().toLocaleString('ar-EG'),
                full_name: name,
                student_id: id,
                program: prog,
                created_at: firebase.firestore.FieldValue.serverTimestamp()
            });
            localStorage.setItem('device_locked', 'true'); // قفل الجهاز
            showStatus("✅ تم تسجيل حضورك بنجاح", "bg-green-100 text-green-700");
            document.getElementById('formSection').classList.add('hidden');
        }

        function showStatus(msg, cls) {
            const m = document.getElementById('statusMsg');
            m.innerText = msg; m.className = "mt-8 p-5 rounded-2xl font-bold " + cls;
            m.classList.remove('hidden');
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
