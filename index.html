<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة دمنهور الأهلية | تسجيل الحضور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; }
        .royal-card { background: white; border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(30, 64, 175, 0.15); border-top: 12px solid #1e3a8a; }
        .btn-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); transition: 0.3s; }
        .btn-gradient:disabled { opacity: 0.6; cursor: not-allowed; }
        .logo-container { background: #fff; padding: 10px; border-radius: 1.5rem; display: inline-block; margin-bottom: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="royal-card w-full max-w-md p-10 text-center">
        <div class="logo-container">
            <img src="https://i.postimg.cc/Y2D4WB9D/Untitled-1102202.png" alt="لوجو جامعة دمنهور الأهلية" class="h-28 mx-auto object-contain">
        </div>
        
        <h1 class="text-2xl font-black text-slate-800 mb-1">جامعة دمنهور الأهلية</h1>
        <p class="text-blue-600 font-bold text-sm mb-8 italic text-opacity-80">كلية الحاسبات والذكاء الإصطناعي</p>

        <div id="inputGroup">
            <div class="text-right mb-6">
                <label class="block text-slate-500 text-xs font-bold mr-2 mb-2 uppercase tracking-wide">كود الطالب الجامعي</label>
                <input type="text" id="studentId" placeholder="مثال: 2024001" 
                    class="w-full p-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-600 outline-none text-center font-bold text-xl transition-all">
            </div>
            
            <button onclick="handleAttendance()" id="mainBtn" class="btn-gradient w-full text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95">
                إرسال الحضور للسحابة
            </button>
        </div>

        <div id="statusMessage" class="mt-8 hidden p-5 rounded-2xl font-bold text-sm"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmKtwqJeZukgwyWCK1CiQVptUd3pN2dGk",
            authDomain: "dnu-343ee.firebaseapp.com",
            projectId: "dnu-343ee",
            storageBucket: "dnu-343ee.firebasestorage.app",
            messagingSenderId: "1001058110283",
            appId: "1:1001058110283:web:b2d16bbd496d6b7435f6ce",
            measurementId: "G-MZJVHWTYG7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const COLLEGE_LOC = { lat: 31.0416, lng: 30.4655 }; 
        const RADIUS = 250; 

        async function handleAttendance() {
            const id = document.getElementById('studentId').value;
            const btn = document.getElementById('mainBtn');
            if(!id) return alert("يرجى إدخال الكود أولاً");

            if(localStorage.getItem('attended_' + id)) {
                return showUIStatus("⚠️ عذراً، لقد قمت بتسجيل الحضور مسبقاً من هذا الجهاز", "bg-amber-100 text-amber-700 border border-amber-200");
            }

            btn.disabled = true;
            btn.innerText = "جاري التحقق...";

            try {
                const settings = await db.collection("settings").doc("gps_config").get();
                const isGpsRequired = settings.exists ? settings.data().is_required : true;

                if (isGpsRequired === false) {
                    saveToCloud(id);
                } else {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const dist = calcDist(pos.coords.latitude, pos.coords.longitude, COLLEGE_LOC.lat, COLLEGE_LOC.lng);
                        if(dist <= RADIUS) {
                            saveToCloud(id);
                        } else {
                            alert(`أنت خارج النطاق بمسافة ${Math.round(dist)} متر`);
                            btn.disabled = false;
                            btn.innerText = "إرسال الحضور للسحابة";
                        }
                    }, (err) => {
                        alert("يجب تفعيل الـ GPS للسماح بالتسجيل داخل الجامعة");
                        btn.disabled = false;
                        btn.innerText = "إرسال الحضور للسحابة";
                    }, { enableHighAccuracy: true });
                }
            } catch (e) {
                alert("خطأ في الاتصال بالخادم");
                btn.disabled = false;
            }
        }

        async function saveToCloud(id) {
            await db.collection("attendance").add({
                student_id: id,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                time: new Date().toLocaleTimeString('ar-EG'),
                date: new Date().toLocaleDateString('ar-EG')
            });
            localStorage.setItem('attended_' + id, 'true');
            showUIStatus("✅ تم تسجيل حضورك بنجاح في سجلات الكلية", "bg-green-100 text-green-700 border border-green-200");
            document.getElementById('inputGroup').classList.add('hidden');
        }

        function showUIStatus(msg, classes) {
            const box = document.getElementById('statusMessage');
            box.innerText = msg;
            box.className = `mt-8 p-5 rounded-2xl font-bold text-sm ${classes}`;
            box.classList.remove('hidden');
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
