<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الحضور | جامعة دمنهور الأهلية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .input-field { border: 1.5px solid #e2e8f0; padding: 0.8rem; border-radius: 0.75rem; width: 100%; outline: none; transition: 0.3s; text-align: right; }
        .input-field:focus { border-color: #1e3a8a; box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md p-8 rounded-[2rem] shadow-xl border-t-[10px] border-[#1e3a8a] text-center">
        <img src="https://i.postimg.cc/Y2D4WB9D/Untitled-1102202.png" class="h-24 mx-auto mb-4">
        <h1 class="text-xl font-black text-slate-800 mb-6">تسجيل حضور الطلاب</h1>

        <div id="formSection" class="space-y-4">
            <input type="text" id="stuName" placeholder="الاسم رباعي" class="input-field">
            <input type="number" id="stuId" placeholder="الرقم القومي (14 رقم)" class="input-field">
            <input type="number" id="stuPhone" placeholder="رقم الموبايل" class="input-field">
            <select id="stuProg" class="input-field">
                <option value="">اختر البرنامج الدراسي</option>
                <option value="AI - G1">ذكاء اصطناعي - G1</option>
                <option value="AI - G2">ذكاء اصطناعي - G2</option>
                <option value="CS - G1">علوم حاسب - G1</option>
                <option value="CS - G2">علوم حاسب - G2</option>
            </select>
            
            <button onclick="handleSubmission()" id="submitBtn" class="w-full bg-[#1e3a8a] text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-900 transition shadow-lg">إرسال البيانات</button>
        </div>
        <div id="statusMsg" class="mt-6 hidden p-4 rounded-xl font-bold"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmKtwqJeZukgwyWCK1CiQVptUd3pN2dGk",
            authDomain: "dnu-343ee.firebaseapp.com",
            projectId: "dnu-343ee",
            storageBucket: "dnu-343ee.firebasestorage.app",
            messagingSenderId: "1001058110283",
            appId: "1:1001058110283:web:b2d16bbd496d6b7435f6ce"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleSubmission() {
            const name = document.getElementById('stuName').value;
            const id = document.getElementById('stuId').value;
            const phone = document.getElementById('stuPhone').value;
            const prog = document.getElementById('stuProg').value;

            if(!name || id.length !== 14 || !phone || !prog) return alert("يرجى إدخال كافة البيانات بشكل صحيح (الرقم القومي 14 رقم)");

            // منع التسجيل أكثر من مرة من نفس الجهاز
            if(localStorage.getItem('attended')) {
                return showStatus("⚠️ لقد قمت بتسجيل الحضور مسبقاً من هذا الهاتف!", "bg-amber-100 text-amber-700");
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "جاري التحقق...";

            try {
                // فحص هل الرقم القومي مسجل مسبقاً في السحابة؟
                const check = await db.collection("attendance").where("national_id", "==", id).get();
                if(!check.empty) {
                    btn.disabled = false; btn.innerText = "إرسال البيانات";
                    return showStatus("❌ هذا الرقم القومي مسجل بالفعل!", "bg-red-100 text-red-700");
                }

                // حفظ البيانات
                await db.collection("attendance").add({
                    timestamp: new Date().toLocaleString('en-US'),
                    full_name: name,
                    national_id: id,
                    mobile: phone,
                    program: prog,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                localStorage.setItem('attended', 'true'); // قفل التسجيل على هذا الهاتف
                showStatus("✅ تم تسجيل حضورك بنجاح", "bg-green-100 text-green-700");
                document.getElementById('formSection').classList.add('hidden');
            } catch(e) { alert("خطأ في الاتصال"); btn.disabled = false; }
        }

        function showStatus(msg, cls) {
            const m = document.getElementById('statusMsg');
            m.innerText = msg; m.className = "mt-6 p-4 rounded-xl font-bold " + cls;
            m.classList.remove('hidden');
        }
    </script>
</body>
</html>
