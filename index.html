<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حضور جامعة دمنهور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-['Cairo']">

    <div class="bg-white p-8 rounded-[2rem] shadow-xl w-full max-w-sm text-center border-t-8 border-blue-900">
        <h1 class="text-xl font-bold text-blue-900 mb-6">تسجيل الحضور السحابي</h1>
        <input type="text" id="studentId" placeholder="أدخل كود الطالب" class="w-full p-4 border rounded-2xl mb-4 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="checkIn()" id="btn" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">إرسال البيانات للسحابة</button>
        <p id="msg" class="mt-4 text-sm font-bold"></p>
    </div>

    <script>
        // إعداداتك اللي بعتها (تأكد إنها صحيحة 100%)
        const firebaseConfig = {
            apiKey: "AIzaSyBmKtwqJeZukgwyWCK1CiQVptUd3pN2dGk",
            authDomain: "dnu-343ee.firebaseapp.com",
            projectId: "dnu-343ee",
            storageBucket: "dnu-343ee.firebasestorage.app",
            messagingSenderId: "1001058110283",
            appId: "1:1001058110283:web:b2d16bbd496d6b7435f6ce",
            measurementId: "G-MZJVHWTYG7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkIn() {
            const id = document.getElementById('studentId').value;
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');

            if(!id) return alert("أدخل الكود يا هندسة");

            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            // تسجيل البيانات مباشرة في Firebase
            db.collection("attendance").add({
                student_id: id,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                time: new Date().toLocaleTimeString('ar-EG'),
                date: new Date().toLocaleDateString('ar-EG')
            })
            .then(() => {
                msg.innerText = "✅ تم الحفظ في السحابة بنجاح!";
                msg.className = "mt-4 text-green-600 font-bold text-sm";
                btn.innerText = "تم التسجيل";
                // حفظ في ذاكرة الموبايل عشان ميسجلش تاني
                localStorage.setItem('done', 'true');
            })
            .catch((error) => {
                console.error("Error: ", error);
                alert("فشل التسجيل: " + error.message);
                btn.disabled = false;
                btn.innerText = "محاولة مرة أخرى";
            });
        }
    </script>
</body>
</html>
